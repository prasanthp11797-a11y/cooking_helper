<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="What to Cook Today? - Daily cooking decision assistant for South Indian homemakers. Find Tamil Nadu home cooking suggestions and tiffins based on your available ingredients." />
  <meta name="theme-color" content="#e65100" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="What to Cook" />

  <title>What to Cook Today?</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════ App Container ═══════ -->
  <div id="app">

    <!-- ─── Header ─── -->
    <header class="app-header" id="app-header">
      <h1><span class="emoji-icon">🍛</span> What to Cook Today?</h1>
      <p class="subtitle">Tamil Nadu Home Cooking</p>
      <div class="header-actions">
        <button class="header-btn install-btn" id="installHeaderBtn" title="Install App" aria-label="Install App">📲</button>
      </div>
    </header>

    <!-- ─── Install Banner ─── -->
    <div class="install-banner" id="installBanner">
      <span class="install-banner-icon">📲</span>
      <div class="install-banner-text">
        <h4>Install App</h4>
        <p>Use offline anytime, like a real app!</p>
      </div>
      <button class="install-banner-action" id="installBannerBtn">Install</button>
    </div>

    <!-- ══════════════════════════════════════════════════ -->
    <!--  HOME VIEW                                        -->
    <!-- ══════════════════════════════════════════════════ -->
    <div class="view active" id="view-home">

      <!-- Filters -->
      <div class="section-title"><span class="icon">🔍</span> Filters</div>
      <div class="filter-bar" id="filterBar">
        <button class="filter-chip veg-filter" data-filter="veg" id="filter-veg">🥬 Veg</button>
        <button class="filter-chip nonveg-filter" data-filter="nonveg" id="filter-nonveg">🍗 Non-Veg</button>
        <button class="filter-chip" data-filter="quick" id="filter-quick">⚡ Quick</button>
        <button class="filter-chip" data-filter="lowEffort" id="filter-lowEffort">😌 Easy</button>
        <button class="filter-chip" data-filter="spicy" id="filter-spicy">🌶️ Spicy</button>
        <button class="filter-chip meal-filter" data-filter="breakfast" id="filter-breakfast">🌅 Breakfast</button>
        <button class="filter-chip meal-filter" data-filter="lunch" id="filter-lunch">🍚 Lunch</button>
        <button class="filter-chip meal-filter" data-filter="snack" id="filter-snack">☕ Snack</button>
        <button class="filter-chip meal-filter" data-filter="dinner" id="filter-dinner">🌙 Dinner</button>
      </div>

      <!-- Ingredient Selection -->
      <div class="section-title">
        <span class="icon">🥘</span> Select Ingredients
        <span class="count" id="ingredientCount">0</span>
      </div>

      <!-- Selected Ingredients Summary -->
      <div class="selected-summary" id="selectedSummary"></div>

      <!-- Ingredient Grid -->
      <div class="ingredient-grid" id="ingredientGrid"></div>

      <!-- Action Buttons -->
      <div class="action-bar">
        <button class="action-btn btn-primary" id="findDishesBtn" disabled>
          🔍 Find Dishes
        </button>
        <button class="action-btn btn-surprise" id="surpriseMeBtn">
          🎲 Surprise Me
        </button>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════ -->
    <!--  SUGGESTIONS VIEW                                 -->
    <!-- ══════════════════════════════════════════════════ -->
    <div class="view" id="view-suggestions">
      <button class="back-btn" id="backFromSuggestions">← Back</button>

      <div class="suggestion-intro" id="suggestionIntro">
        <span class="intro-emoji">👩‍🍳</span>
        <div class="intro-text">
          Based on your ingredients, here are <strong>today's best picks</strong>!
        </div>
      </div>

      <div class="dish-list" id="dishList"></div>
    </div>

    <!-- ══════════════════════════════════════════════════ -->
    <!--  FAVORITES VIEW                                   -->
    <!-- ══════════════════════════════════════════════════ -->
    <div class="view" id="view-favorites">
      <div class="section-title"><span class="icon">❤️</span> Favorites</div>
      <div id="favoritesList"></div>
    </div>

    <!-- ══════════════════════════════════════════════════ -->
    <!--  HISTORY VIEW                                     -->
    <!-- ══════════════════════════════════════════════════ -->
    <div class="view" id="view-history">
      <div class="section-title"><span class="icon">📋</span> Cooking History</div>
      <div id="historyList"></div>
    </div>

  </div><!-- #app -->

  <!-- ─── Recipe Modal ─── -->
  <div class="modal-overlay" id="recipeModal">
    <div class="modal-content" id="recipeModalContent">
      <div class="modal-handle"></div>
      <div id="recipeBody"></div>
    </div>
  </div>

  <!-- ─── Toast ─── -->
  <div class="toast" id="toast"></div>

  <!-- ─── Bottom Navigation ─── -->
  <nav class="bottom-nav" id="bottomNav">
    <div class="bottom-nav-inner">
      <button class="nav-item active" data-view="home" id="nav-home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-view="favorites" id="nav-favorites">
        <span class="nav-icon">❤️</span>
        <span class="nav-label">Favorites</span>
      </button>
      <button class="nav-item" data-view="history" id="nav-history">
        <span class="nav-icon">📋</span>
        <span class="nav-label">History</span>
      </button>
    </div>
  </nav>

  <!-- ─── Scripts ─── -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
